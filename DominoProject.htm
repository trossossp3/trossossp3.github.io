                        <IMG alt="Embedded file printout Chp 2 Assignment.docx Machine generated alternative text:&#10;MCR3U – CHAPTER 2 ASSIGNMENT &#10;ALGEBRA DOMINOS &#10; &#10;Due Date: Thurs, Nov 15 (even day) or Fri, Nov 16 (odd day) &#10;The following assignment can be found on page 135 in your text book. &#10;The assignment asks you to create a square made up of 8 pairs of &#10;Polynomial Expressions and Rational Expressions. The squares marked &#10;with a &#10;P&#10; are the Polynomial Expressions and the ones marked with an &#10;R&#10; &#10;are the Rational Expressions. &#10; &#10; &#10; &#10; &#10; &#10; &#10; &#10; &#10; &#10; &#10;The point is to play the game following the rules below, trying to get the &#10;highest score. &#10; &#10;Remember that a Rational Expressions is simply a Polynomial Expression &#10;divided by another Polynomial expression. &#10; &#10;Example: a Rational Expression is of the form  &#10;(&#10;)&#10;(&#10;)&#10; &#10; &#10;1&#10;R &#10; &#10;2&#10;R &#10; &#10;2&#10;P &#10; &#10;4&#10;P &#10; &#10;1&#10;P &#10; &#10;3&#10;R &#10; &#10;5&#10;R &#10; &#10; &#10;4&#10;R&#10; &#10; &#10;6&#10;P &#10; &#10;3&#10;P &#10; &#10;5&#10;P &#10; &#10;7&#10;R &#10; &#10;6&#10;R &#10; &#10;8&#10;P &#10; &#10;8&#10;R &#10; &#10;7&#10;P &#10;&#13;&#10;&#13;&#10;&#13;&#10;Ink Drawings&#13;&#10;Ink Drawings&#13;&#10;"

                        <IMG alt="Embedded file printout Chp 2 Assignment.docx Machine generated alternative text:&#10;MCR3U – CHAPTER 2 ASSIGNMENT &#10;ALGEBRA DOMINOS &#10; &#10;Due Date: Thurs, Nov 15 (even day) or Fri, Nov 16 (odd day) &#10;The following assignment can be found on page 135 in your text book. &#10;The assignment asks you to create a square made up of 8 pairs of &#10;Polynomial Expressions and Rational Expressions. The squares marked &#10;with a &#10;P&#10; are the Polynomial Expressions and the ones marked with an &#10;R&#10; &#10;are the Rational Expressions. &#10; &#10; &#10; &#10; &#10; &#10; &#10; &#10; &#10; &#10; &#10;The point is to play the game following the rules below, trying to get the &#10;highest score. &#10; &#10;Remember that a Rational Expressions is simply a Polynomial Expression &#10;divided by another Polynomial expression. &#10; &#10;Example: a Rational Expression is of the form  &#10;(&#10;)&#10;(&#10;)&#10; &#10; &#10;1&#10;R &#10; &#10;2&#10;R &#10; &#10;2&#10;P &#10; &#10;4&#10;P &#10; &#10;1&#10;P &#10; &#10;3&#10;R &#10; &#10;5&#10;R &#10; &#10; &#10;4&#10;R&#10; &#10; &#10;6&#10;P &#10; &#10;3&#10;P &#10; &#10;5&#10;P &#10; &#10;7&#10;R &#10; &#10;6&#10;R &#10; &#10;8&#10;P &#10; &#10;8&#10;R &#10; &#10;7&#10;P &#10;&#13;&#10;"

                    <IMG alt="Machine generated alternative text:&#10;MCR3U – CHAPTER 2 ASSIGNMENT &#10;ALGEBRA DOMINOS &#10; &#10;As you fill in every square you need to make sure that you are meeting the &#10;requirements of that square. These requirements often require dividing of &#10;factors so make sure you are writing your expressions in a form that allows &#10;for this. &#10; &#10;RULES&#10; &#10;1) Polynomials, and numerators and denominators of each rational &#10;expression must be &#10;quadratics&#10; &#10;without &#10;a constant common factor. &#10;2) &#10;Restrictions&#10; on the variable in each rational expression must be &#10;stated in its square. &#10;3) When two Polynomials are side by side, then one or both of the &#10;polynomials must be perfect squares. &#10;4) When a Polynomial and a &#10;different-coloured&#10; rational expression are &#10;side by side, their products must simplify &#10;5) When two Rational Expressions are side by side, their products must &#10;simplify &#10;6) When a polynomial is on top of another polynomial, their quotient &#10;must simplify &#10;7) When a polynomial is on top of a &#10;different coloured&#10; rational &#10;expression (or vice-versa) their quotient must simplify. &#10;8) When a rational expression is on top of a rational expression, their &#10;quotient must simplify. &#10; &#10;After completing the table and all the simplification you get one point for &#10;every &#10;different&#10; linear factor that is left in your table. &#10; &#10;HINT&#10;: Before you get started make an example of what each rule will &#10;look like, you may check this with me during class.  &#10;"
